<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="360" viewBox="0 0 1280 360" role="img" aria-label="myclaude_setup - clone-and-go Claude Code setup">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0b1020"/>
      <stop offset="1" stop-color="#131a33"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#7c6cff"/>
      <stop offset="0.5" stop-color="#4f8cff"/>
      <stop offset="1" stop-color="#22d3ee"/>
    </linearGradient>
    <style>
      text { font-family: 'Segoe UI', 'Helvetica Neue', Arial, sans-serif; }
    </style>
  </defs>

  <rect width="1280" height="360" fill="url(#bg)"/>
  <rect width="1280" height="6" fill="url(#accent)"/>

  <!-- terminal glyph -->
  <g transform="translate(96,132)">
    <rect x="-24" y="-40" width="150" height="112" rx="14" fill="none" stroke="url(#accent)" stroke-width="4"/>
    <text x="2" y="34" font-size="56" font-weight="700" fill="url(#accent)">&gt;_</text>
  </g>

  <!-- title + tagline -->
  <text x="300" y="150" font-size="76" font-weight="800" fill="#ffffff">myclaude_setup</text>
  <text x="302" y="196" font-size="30" font-weight="500" fill="#9aa4b2">Clone-and-go Claude Code environment &#8212; plugins, MCP, agents, loops</text>

  <!-- capability chips -->
  <g font-size="22" font-weight="600" fill="#cdd6f4">
    <g transform="translate(300,244)">
      <rect x="0" y="0" width="150" height="44" rx="22" fill="#1c2542"/>
      <text x="75" y="29" text-anchor="middle">29 plugins</text>
    </g>
    <g transform="translate(462,244)">
      <rect x="0" y="0" width="150" height="44" rx="22" fill="#1c2542"/>
      <text x="75" y="29" text-anchor="middle">MCP servers</text>
    </g>
    <g transform="translate(624,244)">
      <rect x="0" y="0" width="130" height="44" rx="22" fill="#1c2542"/>
      <text x="65" y="29" text-anchor="middle">agents</text>
    </g>
    <g transform="translate(766,244)">
      <rect x="0" y="0" width="120" height="44" rx="22" fill="#1c2542"/>
      <text x="60" y="29" text-anchor="middle">loops</text>
    </g>
    <g transform="translate(898,244)">
      <rect x="0" y="0" width="290" height="44" rx="22" fill="#1c2542"/>
      <text x="145" y="29" text-anchor="middle">devs + content creators</text>
    </g>
  </g>

  <text x="300" y="322" font-size="19" fill="#6b748c">git clone &#8226; ./bootstrap &#8226; relaunch Claude Code</text>
</svg>
